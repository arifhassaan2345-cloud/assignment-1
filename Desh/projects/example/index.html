<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple CSS Button Examples</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- মূল কন্টেইনার (সবকিছু মাঝখানে রাখার জন্য) -->
    <div class="main-wrapper">

        <!-- ১. ওপরের হলুদ ব্যানার -->
        <div class="top-banner">
            <span>Ship your project in days, not weeks with <strong>ShipFast</strong></span>
            <button class="banner-btn">⚡ Get Started</button>
        </div>

        <!-- ২. মাঝখানের বড় টাইটেল ও সাবটাইটেল -->
        <h1 class="main-title">Simple CSS Button examples</h1>
        <p class="sub-title">Find the inspiration for your new button design. Click on an element to copy the CSS!</p>
        
        <!-- ৩. বুকমার্ক করার ছোট লেখা -->
        <p class="bookmark-text">📌 Press <span class="kbd">CTRL + D</span> to bookmark this page.</p>

        <!-- ৪. মূল ট্যাব বার (লাল বক্সের অংশটি) -->
        <div class="tab-navbar">
            <button class="tab-btn active">🛎️ Buttons</button>
            <button class="tab-btn">👻 Box-shadows</button>
            <button class="tab-btn">💻 Form inputs</button>
            <button class="tab-btn">🌈 Color palettes</button>
            <button class="tab-btn">🔥 Emojis</button>
        </div>

    </div>

</body>
</html>
